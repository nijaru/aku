linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - gofmt
    - goimports
    - misspell

linters-settings:
  govet:
    check-shadowing: true
  revive:
    rules:
      - name: exported
        disabled: true # Disable for now to avoid large initial diff if many things are unexported

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0

run:
  timeout: 5m
  tests: true
